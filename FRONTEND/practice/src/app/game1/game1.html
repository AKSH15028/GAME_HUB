<div class="wholepage">

       <h1 class="game-title">Mind Cards</h1>

    </div>
  
  <div class="stats-capsule">

    <div class="stat-box">
      <span class="stat-label">SCORE</span>
      <span class="stat-value neon-green">developing</span>
    </div>
    
    <div class="vertical-divider"></div>

    <div class="stat-box">
      <span class="stat-label">ROUND</span>
      <span class="stat-value neon-cyan">developing</span>

    <div class="stat-box">

    </div>
  </div>
</div>

<div class="strikes-wrapper">

    <div class="strike-circle active">
      <span class="x-icon">✕</span>
    </div>

    <!-- Strike 2: Empty/Available (Dark Dimmed Slot) -->
    <div class="strike-circle active">
      <span class="x-icon">✕</span>
    </div>
  </div>
</div>

<div class="game-container">
  <!-- Header Section -->
  <div class="scoreboard-wrapper">
  <h1 class="game-title">Mind Cards</h1>
  
  <div class="stats-capsule">
    <!-- Score Box -->
    <div class="stat-box">
      <span class="stat-label">SCORE</span>
      <span class="stat-value neon-green">dev</span>
    </div>
    
    <div class="vertical-divider"></div>
    
    <!-- Round Box -->
    <div class="stat-box">
      <span class="stat-label">ROUND</span>
      <span class="stat-value neon-cyan">dev</span>
    </div>
    
    <div class="vertical-divider"></div>
    
    <!-- High Score Box -->
    <div class="stat-box">
      <span class="stat-label">HIGH SCORE</span>
      <span class="stat-value neon-cyan">dev</span>
    </div>
  </div>
</div>

  <!-- Strikes Section -->
  <div class="strikes-wrapper">
  <span class="strikes-label">STRIKES</span>
  
  <div class="strikes-row">
    <!-- Strike 1: Active (Cyan Neon Glow) -->
    <div class="strike-circle active">
      <span class="x-icon">✕</span>
    </div>

    <!-- Strike 2: Empty/Available (Dark Dimmed Slot) -->
    <div class="strike-circle active">
      <span class="x-icon">✕</span>
    </div>
  </div>
</div>

  <!-- 3x3 Card Grid Platform -->
  <main class="grid-container">
    <!-- Card 1: Heart (Red Neon) -->
    <div class="card-wrapper">
      <div class="card neon-border-red">
        <span class="card-corner top-left red-text">K<br>♥</span>
        <div class="card-center red-text">♥</div>
        <span class="card-corner bottom-right red-text">K<br>♥</span>
      </div>
    </div>

    <!-- Card 2: Diamond (Purple Neon) -->
    <div class="card-wrapper">
      <div class="card neon-border-purple">
        <span class="card-corner top-left purple-text">A<br>♦</span>
        <div class="card-center purple-text">♦</div>
        <span class="card-corner bottom-right purple-text">A<br>♦</span>
      </div>
    </div>

    <!-- Card 3: Club (Cyan/Green Neon) -->
    <div class="card-wrapper">
      <div class="card neon-border-cyan">
        <span class="card-corner top-left cyan-text">3<br>♣</span>
        <div class="card-center cyan-text">♣</div>
        <span class="card-corner bottom-right cyan-text">3<br>♣</span>
      </div>
    </div>

    <!-- Card 4: Diamond (Red Neon) -->
    <div class="card-wrapper">
      <div class="card neon-border-red">
        <span class="card-corner top-left red-text">A<br>♦</span>
        <div class="card-center red-text">♦</div>
        <span class="card-corner bottom-right red-text">A<br>♦</span>
      </div>
    </div>

    <!-- Card 5: TARGET CARD (Target Frame Focus Overlay) -->
    <div class="card-wrapper target-focus">
      <div class="card neon-border-blue target-card">
        <span class="card-corner top-left blue-text">A<br>♣</span>
        <div class="card-center blue-text">♣</div>
        <span class="card-corner bottom-right blue-text">A<br>♣</span>
      </div>
      <!-- Targeting crosshair brackets from your design -->
      <div class="target-bracket tl"></div>
      <div class="target-bracket tr"></div>
      <div class="target-bracket bl"></div>
      <div class="target-bracket br"></div>
    </div>

    <!-- Card 6: Spade (Green Neon) -->
    <div class="card-wrapper">
      <div class="card neon-border-green">
        <span class="card-corner top-left green-text">A<br>♠</span>
        <div class="card-center green-text">♠</div>
        <span class="card-corner bottom-right green-text">A<br>♠</span>
      </div>
    </div>

    <!-- Card 7: Heart (Red Neon) -->
    <div class="card-wrapper">
      <div class="card neon-border-red">
        <span class="card-corner top-left red-text">K<br>♥</span>
        <div class="card-center red-text">♥</div>
        <span class="card-corner bottom-right red-text">K<br>♥</span>
      </div>
    </div>

    <!-- Card 8: Club (Purple Neon) -->
    <div class="card-wrapper">
      <div class="card neon-border-purple">
        <span class="card-corner top-left purple-text">A<br>♣</span>
        <div class="card-center purple-text">♣</div>
        <span class="card-corner bottom-right purple-text">A<br>♣</span>
      </div>
    </div>

    <!-- Card 9: Spade (Green Neon) -->
    <div class="card-wrapper">
      <div class="card neon-border-green">
        <span class="card-corner top-left green-text">A<br>♠</span>
        <div class="card-center green-text">♠</div>
        <span class="card-corner bottom-right green-text">A<br>♠</span>
      </div>
    </div>
  </main>

  <!-- Footer Navigation Indicators -->
  <footer class="game-footer">
    <div class="bottom-deco-indicators">
      <span class="deco-x faded-red">✕</span>
      <span class="deco-x neon-cyan">✕</span>
      <span class="deco-x dark-gray">✕</span>
    </div>
    
    <div class="footer-controls">
      <span class="player-name">Player Name</span>
      <button class="leaderboard-btn">LEADERBOARD</button>
    </div>
  </footer>
</div>
